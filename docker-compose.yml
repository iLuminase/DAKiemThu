version: '3.8'

services:
  # MSSQL Database
  mssql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: inventory-mssql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=admin@123
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - inventory-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P admin@123 -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Spring Boot Backend
  backend:
    build:
      context: ./backend/inventory
      dockerfile: Dockerfile
    container_name: inventory-backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://mssql:1433;databaseName=InventoryManagement;encrypt=false;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=admin@123
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-sk_test_default_key}
    ports:
      - "8080:8080"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - inventory-network
    healthcheck:
      test: curl -f http://localhost:8080/api/actuator/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  mssql-data:
    driver: local

networks:
  inventory-network:
    driver: bridge
